<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enter OTP</title>
  <style>
    /* reuse styles from index.html */
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
    .login-box { background: white; padding: 30px 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); width: 300px; text-align: center;}
    h2 { margin-bottom: 20px;}
    input[type="text"] { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;}
    button { width: 100%; padding: 10px; background-color: #007BFF; border: none; color: white; font-size: 16px; border-radius: 5px; cursor: pointer;}
    button:hover { background-color: #0056b3;}
    .error { color: red; margin-bottom: 10px;}
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Enter OTP</h2>
    
    <form th:action="@{/verify-otp}" method="post">
      <input type="hidden" name="voterId" th:value="${voterId}" />
      <input type="text" name="otp" placeholder="Enter OTP" required />
      <button type="submit">Verify OTP</button>
    </form>

    <div th:if="${error}" class="error" th:text="${error}"></div>
  </div>
</body>
</html>
