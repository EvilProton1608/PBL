<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vote Result</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;}
    .result-box { background: white; padding: 30px 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); width: 300px; text-align: center;}
    h2 { margin-bottom: 20px;}
  </style>
</head>
<body>
  <div class="result-box">
    <h2>Thank You!</h2>
    <p th:text="${message}">Your vote has been recorded.</p>
  </div>
</body>
</html>
